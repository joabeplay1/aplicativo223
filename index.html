<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jesus Reina</title>

  <!-- 1. Fontes do Google -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- 2. Tailwind CSS (Sem precisar instalar nada) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          }
        }
      }
    }
  </script>

  <!-- 3. React e Bibliotecas via CDN (Scripts que rodam no navegador) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-router-dom@6.22.3/dist/umd/react-router-dom.production.min.js"></script>
  <script src="https://unpkg.com/@tanstack/react-query@5.28.4/build/umd/index.production.js"></script>
  
  <!-- 4. Babel (Para o navegador entender a sintaxe JSX do React sem o Node) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #0f172a;
      color: #f8fafc;
    }
  </style>
</head>
<body>

  <!-- Onde o React vai renderizar o App -->
  <div id="root"></div>

  <!-- Nosso código React adaptado para rodar sem Node -->
  <script type="text/babel">
    // Extraindo os componentes das bibliotecas globais carregadas no head
    const { useState } = React;
    const { BrowserRouter, HashRouter, Routes, Route, Navigate, Outlet, Link, useParams } = ReactRouterDOM;
    const { QueryClient, QueryClientProvider } = ReactQuery;

    const queryClientInstance = new QueryClient();

    // --- CONTEXTO DE AUTENTICAÇÃO SIMULADO ---
    function AuthProvider({ children }) {
      const [user, setUser] = useState({ name: "Usuário Teste" });
      return (
        <div value={{ user }}>
          {children}
        </div>
      );
    }

    // --- COMPONENTES DE LAYOUT ---
    function Sidebar({ collapsed, onToggle }) {
      return (
        <aside className={`fixed top-0 left-0 h-full bg-slate-900 border-r border-slate-800 transition-all duration-300 p-4 ${collapsed ? 'w-16' : 'w-56'}`}>
          <button onClick={onToggle} className="w-full bg-slate-800 hover:bg-slate-700 text-white py-1 px-2 rounded mb-6 text-xs">
            {collapsed ? '➔' : '✕ Recolher'}
          </button>
          <nav className="flex flex-col gap-3">
            <Link to="/" className="text-slate-300 hover:text-white flex gap-2">🏠 {!collapsed && 'Início'}</Link>
            <Link to="/projects" className="text-slate-300 hover:text-white flex gap-2">📂 {!collapsed && 'Projetos'}</Link>
            <Link to="/platform-code" className="text-slate-300 hover:text-white flex gap-2">💻 {!collapsed && 'Código'}</Link>
            <Link to="/settings" className="text-slate-300 hover:text-white flex gap-2">⚙️ {!collapsed && 'Configurações'}</Link>
          </nav>
        </aside>
      );
    }

    function AppLayout() {
      const [collapsed, setCollapsed] = useState(false);
      return (
        <div className="min-h-screen">
          <Sidebar collapsed={collapsed} onToggle={() => setCollapsed(!collapsed)} />
          <main className={`transition-all duration-300 p-8 ${collapsed ? 'ml-16' : 'ml-56'}`}>
            <Outlet />
          </main>
        </div>
      );
    }

    // --- PÁGINAS ---
    function Home() {
      return (
        <div>
          <h1 className="text-3xl font-bold mb-4">Gerador de Apps com IA 🚀</h1>
          <p className="text-slate-400 mb-6">Digite seu prompt abaixo para começar a criar seu aplicativo.</p>
          <textarea className="w-full h-32 bg-slate-800 border border-slate-700 rounded p-3 text-white focus:outline-none focus:border-indigo-500" placeholder="Ex: Crie um app de lista de tarefas com tema escuro..."></textarea>
          <button className="mt-4 bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-6 rounded transition">Criar App</button>
        </div>
      );
    }

    function Projects() {
      return (
        <div>
          <h1 className="text-2xl font-bold mb-4">Seus Projetos</h1>
          <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div className="bg-slate-900 border border-slate-800 p-4 rounded hover:border-slate-700">
              <h3 className="font-semibold text-lg">Projeto Exemplo #1</h3>
              <p className="text-xs text-slate-500 mt-1">Criado recentemente</p>
              <Link to="/editor/1" className="inline-block mt-4 text-xs bg-slate-800 hover:bg-slate-700 px-3 py-1.5 rounded">Abrir no Editor</Link>
            </div>
          </div>
        </div>
      );
    }

    function Editor() {
      const { id } = useParams();
      return (
        <div className="p-6 h-screen flex flex-col">
          <div className="flex justify-between items-center mb-4">
            <h1 className="text-xl font-bold">🛠️ Editor GenForge — Projeto ID: {id}</h1>
            <Link to="/projects" className="text-sm text-slate-400 hover:text-white">◀ Voltar aos Projetos</Link>
          </div>
          <div className="grid grid-cols-1 lg:grid-cols-3 gap-4 flex-1">
            <div className="bg-slate-900 border border-slate-800 rounded p-4 lg:col-span-2">
              <span className="text-xs font-mono text-indigo-400">PreviewPanel.jsx & CodeEditor.jsx</span>
              <div className="mt-2 bg-slate-950 h-64 rounded border border-slate-800 p-4 font-mono text-sm text-emerald-400">
                &lt;div&gt; Seu app gerado aparece aqui &lt;/div&gt;
              </div>
            </div>
            <div className="bg-slate-900 border border-slate-800 rounded p-4 flex flex-col justify-between">
              <div>
                <span className="text-xs font-mono text-indigo-400">ChatPanel.jsx (Assistente IA)</span>
                <p className="text-sm text-slate-400 mt-2">Peça alterações no código para o Gemini.</p>
              </div>
              <input type="text" className="w-full bg-slate-800 border border-slate-700 rounded p-2 text-sm mt-4" placeholder="Pedir alteração..."/>
            </div>
          </div>
        </div>
      );
    }

    function Settings() {
      return (
        <div>
          <h1 className="text-2xl font-bold mb-4">Configurações da Plataforma</h1>
          <div className="bg-slate-900 border border-slate-800 p-6 rounded-lg max-w-xl">
            <label className="block text-sm font-medium text-slate-300 mb-2">Chave de API do Gemini</label>
            <input type="password" className="w-full bg-slate-800 border border-slate-700 rounded p-2 text-white mb-4" placeholder="AIzaSy..." />
            <button className="bg-emerald-600 hover:bg-emerald-700 text-white text-sm py-2 px-4 rounded font-medium">Salvar Chave</button>
          </div>
        </div>
      );
    }

    function PlatformCode() { return <div><h1 className="text-2xl font-bold">Código da Plataforma</h1></div>; }
    function Login() { return <div className="p-8 text-center"><h2>Página de Login</h2><Link to="/" className="text-indigo-400">Entrar fictício</Link></div>; }
    function PageNotFound() { return <div className="p-8 text-center"><h2>404 - Página Não Encontrada</h2></div>; }

    // --- APP PRINCIPAL COM AS ROTAS ---
    function App() {
      return (
        <QueryClientProvider client={queryClientInstance}>
          <AuthProvider>
            {/* Usamos HashRouter em vez de BrowserRouter para funcionar em qualquer servidor web sem precisar de .htaccess */}
            <HashRouter>
              <Routes>
                <Route path="/login" element={<Login />} />
                <Route element={<AppLayout />}>
                  <Route path="/" element={<Home />} />
                  <Route path="/projects" element={<Projects />} />
                  <Route path="/settings" element={<Settings />} />
                  <Route path="/platform-code" element={<PlatformCode />} />
                </Route>
                <Route path="/editor/:id" element={<Editor />} />
                <Route path="*" element={<PageNotFound />} />
              </Routes>
            </HashRouter>
          </AuthProvider>
        </QueryClientProvider>
      );
    }

    // Renderizando na tela
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>

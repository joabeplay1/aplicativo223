<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SyncWave Pro - Seu Player de Música</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="app" class="dark-theme">
    
    <aside id="sidebar">
      <div class="logo">
        <span class="icon-wave"></span>SyncWave
      </div>
      <nav>
        <ul>
          <li class="active" data-view="home"><i class="icon">🏠</i> Início</li>
          <li data-view="library"><i class="icon">📚</i> Biblioteca</li>
          <li data-view="playlists"><i class="icon">📜</i> Playlists</li>
          <li data-view="favorites"><i class="icon">⭐</i> Favoritos</li>
          <li data-view="drive"><i class="icon">☁️</i> Google Drive</li>
          <li data-view="folders"><i class="icon">📁</i> Pastas</li>
        </ul>
      </nav>
      <div class="sidebar-footer">
        <button id="theme-toggle">🌓 Modo</button>
      </div>
    </aside>

    <main id="content-area">
      <header id="main-header">
        <div class="search-bar">
          <input type="text" id="global-search" placeholder="O que você quer ouvir?">
          <button id="search-btn">🔍</button>
        </div>
        <div class="user-profile">
          <button id="drive-connect-btn">Conectar Drive</button>
          <div class="avatar"></div>
        </div>
      </header>
      
      <div id="dynamic-view" class="fade-in"></div>
    </main>

    <footer id="player-bar">
      <div class="now-playing">
        <img id="player-art" src="https://via.placeholder.com/60" alt="Capa do Álbum">
        <div class="track-info">
          <span id="player-title">Nenhuma música</span>
          <span id="player-artist">-</span>
        </div>
        <button id="btn-fav-current" class="icon-btn">♡</button>
      </div>

      <div class="player-controls">
        <div class="control-buttons">
          <button id="btn-shuffle" class="icon-btn">🔀</button>
          <button id="btn-prev" class="icon-btn">⏮</button>
          <button id="btn-play-pause" class="main-btn">▶</button>
          <button id="btn-next" class="icon-btn">⏭</button>
          <button id="btn-repeat" class="icon-btn">🔁</button>
        </div>
        <div class="progress-container">
          <span id="current-time">0:00</span>
          <div id="progress-track">
            <div id="progress-bar"></div>
          </div>
          <span id="total-time">0:00</span>
        </div>
      </div>

      <div class="volume-controls">
        <button id="btn-mute" class="icon-btn">🔊</button>
        <input type="range" id="volume-slider" min="0" max="100" value="80">
      </div>
    </footer>

    <div id="modal-overlay" class="hidden">
      <div class="modal-content">
        <h3 id="modal-title">Título</h3>
        <div id="modal-body"></div>
        <div class="modal-footer">
          <button id="modal-cancel">Cancelar</button>
          <button id="modal-confirm">Confirmar</button>
        </div>
      </div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
